query FindProfile {
  findProfile {
    username
    email
    displayName
    avatar
    bio
    socialLinks {
      title
      url
    }
    isTotpEnabled
    isVerified
    notificationSettings {
      siteNotifications
      telegramNotifications
    }
    stream {
      serverUrl
      streamKey
      isChatEnabled
      isChatFollowersOnly
      isChatPremiumFollowersOnly
    }
  }
}
